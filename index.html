<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetAnalytics Pro</title>

<style>
body {
  background:#0a0e17;
  color:#fff;
  font-family:Arial;
  text-align:center;
  padding:40px;
}
input,button{
  padding:10px;
  margin:10px;
  border-radius:8px;
  border:none;
}
button{
  background:#22c55e;
  cursor:pointer;
}
.card{
  background:#111827;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>BetAnalytics Pro</h1>

<input id="token" placeholder="API Token">
<button onclick="loadData()">Load Matches</button>

<div id="app"></div>

<script>
const API = "https://sports.bzzoiro.com/api";

async function loadData(){
  const token = document.getElementById("token").value;
  if(!token){
    alert("Bagă tokenul");
    return;
  }

  document.getElementById("app").innerHTML="Se încarcă...";

  try{
    const res = await fetch(API + "/predictions?token=" + token);
    const data = await res.json();

    const matches = data.results || [];

    render(matches);

  }catch(e){
    document.getElementById("app").innerHTML="Eroare API";
  }
}

function render(matches){

  if(matches.length===0){
    document.getElementById("app").innerHTML="Nu sunt date";
    return;
  }

  let html="";

  matches.slice(0,10).forEach(m=>{

    const home = m.event.home_team;
    const away = m.event.away_team;

    const xgH = m.expected_home_goals || 0;
    const xgA = m.expected_away_goals || 0;

    const prob = calcOver15(xgH,xgA);

    html+=`
      <div class="card">
        <h3>${home} vs ${away}</h3>
        <p>xG: ${xgH.toFixed(2)} - ${xgA.toFixed(2)}</p>
        <p>+1.5 Goluri Prob: ${(prob*100).toFixed(1)}%</p>
      </div>
    `;
  });

  document.getElementById("app").innerHTML=html;
}

// Poisson simplu
function factorial(n){
  if(n===0) return 1;
  return n*factorial(n-1);
}

function poisson(k,lambda){
  return (Math.pow(lambda,k)*Math.exp(-lambda))/factorial(k);
}

function calcOver15(lh,la){
  let p=0;
  for(let i=0;i<5;i++){
    for(let j=0;j<5;j++){
      if(i+j>1){
        p+=poisson(i,lh)*poisson(j,la);
      }
    }
  }
  return p;
}
</script>

</body>
</html>
